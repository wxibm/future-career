<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>未来职造：专业·岗位技能·招聘信息指南网</title>
    <!-- 引入Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入Font Awesome图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Tailwind自定义配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1E3A8A', // 主色调深蓝
                        secondary: '#3B82F6', // 辅助色亮蓝
                        tech: {
                            50: '#EFF6FF',
                            100: '#DBEAFE',
                            200: '#BFDBFE',
                            800: '#1E40AF',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            /* 导航项样式 */
            .nav-item {
                @apply px-4 py-2 rounded-md transition-all duration-300 hover:bg-secondary/20 hover:text-white;
            }
            /* 专业卡片样式 */
            .major-card {
                @apply bg-white rounded-xl shadow-sm border border-tech-200/50 transition-all duration-300 hover:shadow-lg hover:scale-[1.02] hover:bg-tech-50 cursor-pointer;
            }
            /* 加载中样式 */
            .loading {
                @apply flex justify-center items-center py-16 text-gray-500;
            }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 min-h-screen flex flex-col">
    <!-- 头部导航 -->
    <header class="bg-primary text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4">
            <!-- Logo和标题 -->
            <div class="flex items-center justify-between py-4">
                <div class="flex items-center space-x-3">
                    <div class="w-12 h-12 bg-secondary rounded-lg flex items-center justify-center">
                        <i class="fa-solid fa-briefcase text-2xl"></i>
                    </div>
                    <h1 class="text-xl md:text-2xl font-bold">未来职造：专业·岗位技能·招聘信息指南网</h1>
                </div>
                
                <!-- 移动端菜单按钮 -->
                <button id="menuBtn" class="md:hidden text-white text-2xl">
                    <i class="fa-solid fa-bars"></i>
                </button>
                
                <!-- 导航菜单 - 桌面端 -->
                <nav class="hidden md:flex items-center space-x-1">
                    <a href="index.html" class="nav-item">网站首页</a>
                    <a href="majors.html" class="nav-item bg-secondary/30 font-medium">专业列表</a>
                    <a href="skills.html" class="nav-item">岗位技能</a>
                    <a href="recruitments.html" class="nav-item">招聘信息</a>
                    <a href="news.html" class="nav-item">就业新闻</a>
                    <a href="policies.html" class="nav-item">就业政策</a>
                    <a href="interview.html" class="nav-item">面试技巧</a>
                </nav>
            </div>
            
            <!-- 移动端导航菜单 -->
            <nav id="mobileMenu" class="md:hidden hidden pb-4">
                <div class="flex flex-col space-y-2">
                    <a href="index.html" class="nav-item">网站首页</a>
                    <a href="majors.html" class="nav-item bg-secondary/30 font-medium">专业列表</a>
                    <a href="skills.html" class="nav-item">岗位技能</a>
                    <a href="recruitments.html" class="nav-item">招聘信息</a>
                    <a href="news.html" class="nav-item">就业新闻</a>
                    <a href="policies.html" class="nav-item">就业政策</a>
                    <a href="interview.html" class="nav-item">面试技巧</a>
                </div>
            </nav>
        </div>
    </header>

    <!-- 主要内容区 -->
    <main class="flex-1 container mx-auto px-4 py-8">
        <!-- 页面标题 -->
        <div class="mb-8">
            <h2 class="text-[clamp(1.5rem,3vw,2.5rem)] font-bold text-primary flex items-center">
                <i class="fa-solid fa-graduation-cap text-secondary mr-3"></i>专业列表
            </h2>
            <p class="text-gray-600 mt-2">涵盖各大热门专业，精准匹配对应岗位技能与招聘信息</p>
        </div>

        <!-- 专业卡片网格布局 -->
        <div id="majorsContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
            <!-- 加载中提示 -->
            <div class="loading col-span-full">
                <i class="fa-solid fa-spinner fa-spin mr-2"></i>
                <span>正在加载专业数据...</span>
            </div>
        </div>

        <!-- 加载更多按钮 -->
        <div class="text-center">
            <button id="loadMoreBtn" class="bg-secondary hover:bg-primary text-white font-medium py-3 px-8 rounded-lg transition-all duration-300 shadow-md hover:shadow-lg hidden">
                <i class="fa-solid fa-plus-circle mr-2"></i>加载更多
            </button>
            <p id="noMoreData" class="text-gray-500 mt-4 hidden">已加载全部专业数据</p>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="bg-primary text-white py-6 mt-auto">
        <div class="container mx-auto px-4 text-center">
            <p>&copy; 2026 未来职造 - 专业·岗位技能·招聘信息指南网 版权所有</p>
            <p class="text-sm text-tech-200 mt-2">本网站仅提供就业信息参考，具体以官方发布为准</p>
        </div>
    </footer>

    <!-- JavaScript交互逻辑 -->
    <script>
        // 全局变量
        let majorData = []; // 存储从JSON读取的专业数据
        let currentPage = 1; // 当前页码
        const itemsPerPage = 10; // 每页显示数量
        let totalPages = 0; // 总页数
        const majorsContainer = document.getElementById('majorsContainer');
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        const noMoreData = document.getElementById('noMoreData');

        // 移动端菜单切换
        const menuBtn = document.getElementById('menuBtn');
        const mobileMenu = document.getElementById('mobileMenu');
        menuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
            const icon = menuBtn.querySelector('i');
            icon.classList.toggle('fa-bars');
            icon.classList.toggle('fa-times');
        });

        // 从JSON文件加载数据
        async function loadMajorData() {
            try {
                // 读取majors.json文件
                const response = await fetch('data/majors.json');
                if (!response.ok) {
                    throw new Error(`HTTP错误！状态码：${response.status}`);
                }
                // 解析JSON数据
                const data = await response.json();
                // 格式化数据（适配原有渲染逻辑）
                majorData = data.map(item => ({
                    id: item.id,
                    code: item.major_code,
                    name: item.name,
                    logo: item.major_logo,
                    intro: item.description
                }));
                // 计算总页数
                totalPages = Math.ceil(majorData.length / itemsPerPage);
                // 清空加载中提示
                majorsContainer.innerHTML = '';
                // 渲染第一页数据
                renderMajors(currentPage);
                // 显示加载更多按钮（如果有更多数据）
                if (currentPage < totalPages) {
                    loadMoreBtn.classList.remove('hidden');
                }
            } catch (error) {
                // 加载失败提示
                majorsContainer.innerHTML = `
                    <div class="col-span-full text-center py-16 text-red-500">
                        <i class="fa-solid fa-exclamation-circle text-2xl mb-2"></i>
                        <p>加载专业数据失败：${error.message}</p>
                        <button onclick="loadMajorData()" class="mt-4 bg-secondary text-white px-4 py-2 rounded-lg">重试</button>
                    </div>
                `;
                console.error('加载数据失败：', error);
            }
        }

        // 渲染专业卡片
        function renderMajors(page) {
            // 计算当前页显示的数据范围
            const startIndex = (page - 1) * itemsPerPage;
            const endIndex = Math.min(startIndex + itemsPerPage, majorData.length);
            const currentData = majorData.slice(startIndex, endIndex);

            // 创建卡片元素
            currentData.forEach(major => {
                const card = document.createElement('div');
                card.className = 'major-card';
                card.setAttribute('data-major-id', major.id);
                
                // 卡片内容
                card.innerHTML = `
                    <div class="p-4 flex items-start">
                        <!-- 专业logo -->
                        <img src="${major.logo}" alt="${major.name}" class="w-20 h-20 rounded-lg object-cover mr-4 flex-shrink-0">
                        <!-- 专业信息 -->
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center justify-between mb-2">
                                <h3 class="text-lg font-semibold text-primary">${major.name}</h3>
                                <span class="text-sm text-gray-500 bg-gray-100 px-2 py-1 rounded">${major.code}</span>
                            </div>
                            <p class="text-sm text-gray-600 mb-3 line-clamp-2">${major.intro}</p>
                            <div class="flex items-center justify-between">
                                <span class="text-xs text-gray-500">专业代码：${major.code}</span>
                                <a href="recruitments.html?id=${major.id}" class="text-secondary hover:text-primary font-medium flex items-center">
                                    查看招聘信息 <i class="fa-solid fa-arrow-right ml-1 text-xs"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                `;

                // 卡片点击事件（跳转至岗位列表页）
                card.addEventListener('click', () => {
                    window.location.href = `skills.html?id=${major.id}`;
                });

                // 添加到容器
                majorsContainer.appendChild(card);
            });

            // 更新按钮状态
            if (currentPage >= totalPages) {
                loadMoreBtn.classList.add('hidden');
                noMoreData.classList.remove('hidden');
            }
        }

        // 加载更多按钮点击事件
        loadMoreBtn.addEventListener('click', () => {
            currentPage++;
            renderMajors(currentPage);
        });

        // 页面加载时初始化数据
        window.addEventListener('DOMContentLoaded', loadMajorData);
    </script>
</body>
</html>
