<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>未来职造：专业·岗位技能·招聘信息指南网</title>
    <!-- 引入Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入Font Awesome图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Tailwind自定义配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1E3A8A', // 主色调深蓝
                        secondary: '#3B82F6', // 辅助色亮蓝
                        tech: {
                            50: '#EFF6FF',
                            100: '#DBEAFE',
                            200: '#BFDBFE',
                            800: '#1E40AF',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            /* 顶部导航项样式 */
            .nav-item {
                @apply px-4 py-2 rounded-md transition-all duration-300 hover:bg-secondary/20 hover:text-white;
            }
            /* 左侧栏目导航项 */
            .category-item {
                @apply p-4 rounded-xl transition-all duration-300 hover:bg-tech-100 hover:text-primary font-medium border-l-4 border-transparent hover:border-secondary cursor-pointer flex items-center;
            }
            /* 右侧新闻列表项 */
            .news-item {
                @apply p-4 rounded-xl bg-white shadow-sm border border-tech-200/50 transition-all duration-300 hover:shadow-md hover:bg-tech-50 cursor-pointer;
            }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 min-h-screen flex flex-col">
    <!-- 头部导航 -->
    <header class="bg-primary text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4">
            <!-- Logo和标题 -->
            <div class="flex items-center justify-between py-4">
                <div class="flex items-center space-x-3">
                    <div class="w-12 h-12 bg-secondary rounded-lg flex items-center justify-center">
                        <i class="fa-solid fa-briefcase text-2xl"></i>
                    </div>
                    <h1 class="text-xl md:text-2xl font-bold">未来职造：专业·岗位技能·招聘信息指南网</h1>
                </div>
                
                <!-- 移动端菜单按钮 -->
                <button id="menuBtn" class="md:hidden text-white text-2xl">
                    <i class="fa-solid fa-bars"></i>
                </button>
                
                <!-- 导航菜单 - 桌面端 -->
                <nav class="hidden md:flex items-center space-x-1">
                    <a href="index.html" class="nav-item">网站首页</a>
                    <a href="majors.html" class="nav-item">专业列表</a>
                    <a href="skills.html" class="nav-item">岗位技能</a>
                    <a href="recruitments.html" class="nav-item">招聘信息</a>
                    <a href="news.html" class="nav-item bg-secondary/30 font-medium">就业新闻</a>
                    <a href="policies.html" class="nav-item">就业政策</a>
                    <a href="interview.html" class="nav-item">面试技巧</a>
                </nav>
            </div>
            
            <!-- 移动端导航菜单 -->
            <nav id="mobileMenu" class="md:hidden hidden pb-4">
                <div class="flex flex-col space-y-2">
                    <a href="index.html" class="nav-item">网站首页</a>
                    <a href="majors.html" class="nav-item">专业列表</a>
                    <a href="skills.html" class="nav-item">岗位技能</a>
                    <a href="recruitments.html" class="nav-item">招聘信息</a>
                    <a href="news.html" class="nav-item bg-secondary/30 font-medium">就业新闻</a>
                    <a href="policies.html" class="nav-item">就业政策</a>
                    <a href="interview.html" class="nav-item">面试技巧</a>
                </div>
            </nav>
        </div>
    </header>

    <!-- 主要内容区 -->
    <main class="flex-1 container mx-auto px-4 py-8">
        <!-- 页面标题 -->
        <div class="mb-8">
            <h2 class="text-[clamp(1.5rem,3vw,2.5rem)] font-bold text-primary flex items-center">
                <i class="fa-solid fa-newspaper text-secondary mr-3"></i>就业新闻
            </h2>
            <p class="text-gray-600 mt-2">掌握最新行业动态、招聘资讯和新兴岗位信息，把握职业发展机遇</p>
        </div>

        <!-- 两栏布局 -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- 左侧：栏目导航 -->
            <div class="lg:col-span-3 bg-white rounded-xl shadow-sm p-4 h-fit sticky top-24">
                <h3 class="text-xl font-semibold text-primary mb-4 flex items-center border-b border-tech-200 pb-3">
                    <i class="fa-solid fa-list-ul text-secondary mr-2"></i>栏目导航
                </h3>
                <div id="categoryNav" class="space-y-2">
                    <!-- 栏目列表会通过JS生成 -->
                </div>
            </div>

            <!-- 右侧：信息列表 -->
            <div class="lg:col-span-9 bg-white rounded-xl shadow-sm p-4">
                <h3 id="contentTitle" class="text-xl font-semibold text-primary mb-4 flex items-center border-b border-tech-200 pb-3">
                    <i class="fa-solid fa-industry text-secondary mr-2"></i>行业动态
                </h3>
                <div id="newsList" class="space-y-4 max-h-[800px] overflow-y-auto pr-2">
                    <!-- 新闻列表会通过JS生成 -->
                </div>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="bg-primary text-white py-6 mt-auto">
        <div class="container mx-auto px-4 text-center">
            <p>&copy; 2026 未来职造 - 专业·岗位技能·招聘信息指南网 版权所有</p>
            <p class="text-sm text-tech-200 mt-2">本网站仅提供就业信息参考，具体以官方发布为准</p>
        </div>
    </footer>

    <!-- JavaScript交互逻辑 -->
    <script>
        // 模拟数据
        // 1. 栏目导航数据
        const categoryData = [
            { id: 1, name: "行业动态", icon: "fa-industry" },
            { id: 2, name: "招聘资讯", icon: "fa-bullhorn" },
            { id: 3, name: "新兴岗位", icon: "fa-rocket" }
        ];

        // 2. 新闻信息数据（关联栏目ID）
        const newsData = {
            // 行业动态
            1: [
                {
                    id: 1,
                    title: "2026年数字经济行业发展趋势报告发布",
                    content: "近日，工信部发布《2026年数字经济行业发展趋势报告》，报告显示，数字经济核心产业增加值占GDP比重将提升至15%以上，人工智能、大数据、云计算等领域将迎来爆发式增长。报告指出，未来三年数字经济领域将新增就业岗位超200万个，其中高端技术岗位占比达40%。",
                    thumb: "https://picsum.photos/id/80/100/100",
                    date: "2026-02-20"
                },
                {
                    id: 2,
                    title: "新能源行业人才需求同比增长35%",
                    content: "据智联招聘最新数据显示，2026年一季度新能源行业招聘需求同比增长35%，其中动力电池研发、新能源汽车电控、光伏技术等岗位需求最为旺盛。行业平均薪资较传统制造业高出28%，硕士及以上学历人才薪资溢价达50%。",
                    thumb: "https://picsum.photos/id/81/100/100",
                    date: "2026-02-18"
                },
                {
                    id: 3,
                    title: "人工智能行业迎来规范化发展新阶段",
                    content: "随着《生成式人工智能服务管理暂行办法》的正式实施，人工智能行业进入规范化发展新阶段。业内专家表示，合规化将加速行业洗牌，具备核心技术和数据安全能力的企业将占据市场主导地位，相关专业人才需求将更加精细化。",
                    thumb: "https://picsum.photos/id/82/100/100",
                    date: "2026-02-15"
                },
                {
                    id: 4,
                    title: "跨境电商行业政策红利持续释放",
                    content: "海关总署最新数据显示，2025年我国跨境电商进出口额突破2万亿元，同比增长18.6%。2026年多地出台跨境电商扶持政策，鼓励企业拓展海外市场，跨境电商运营、国际物流、海外仓管理等岗位需求持续攀升。",
                    thumb: "https://picsum.photos/id/83/100/100",
                    date: "2026-02-12"
                }
            ],
            // 招聘资讯
            2: [
                {
                    id: 5,
                    title: "2026年春招市场呈现三大新趋势",
                    content: "2026年春季招聘市场已全面启动，数据显示，今年春招呈现三大新趋势：一是企业招聘更注重实战能力，实习经历和项目经验成为核心考核指标；二是远程办公岗位占比提升至25%，灵活就业模式受年轻人青睐；三是中小企业招聘需求回暖，岗位数量同比增长12%。",
                    thumb: "https://picsum.photos/id/84/100/100",
                    date: "2026-02-19"
                },
                {
                    id: 6,
                    title: "大厂校招开启“人才升级”计划",
                    content: "腾讯、阿里、字节跳动等互联网大厂2026届校招开启“人才升级”计划，缩减通用岗位招聘规模，重点扩招人工智能、大模型研发、数据安全等高端技术岗位。校招薪资普遍上调8%-12%，部分核心岗位年薪突破40万元。",
                    thumb: "https://picsum.photos/id/85/100/100",
                    date: "2026-02-17"
                },
                {
                    id: 7,
                    title: "蓝领技能人才招聘需求逆势增长",
                    content: "受制造业升级和实体经济复苏影响，2026年蓝领技能人才招聘需求逆势增长，高级技工、数控操作工、智能制造技师等岗位缺口达300万人。企业纷纷提高技能人才待遇，部分企业为高级技师提供购房补贴、子女教育等福利。",
                    thumb: "https://picsum.photos/id/86/100/100",
                    date: "2026-02-14"
                }
            ],
            // 新兴岗位
            3: [
                {
                    id: 8,
                    title: "AI训练师成为2026年最热门新兴岗位",
                    content: "人社部最新发布的《新职业发展报告》显示，AI训练师已成为2026年最热门的新兴职业，岗位需求同比增长215%。该岗位主要负责人工智能模型的数据标注、模型调优、效果评估等工作，入门薪资可达8-15K，资深从业者年薪超30万元。",
                    thumb: "https://picsum.photos/id/87/100/100",
                    date: "2026-02-21"
                },
                {
                    id: 9,
                    title: "碳资产管理师岗位需求快速增长",
                    content: "随着“双碳”目标的推进，碳资产管理师成为新兴热门岗位，2026年一季度招聘需求同比增长180%。该岗位主要负责企业碳核算、碳交易、碳中和规划等工作，具备碳管理体系认证的人才薪资溢价达40%，一线城市平均月薪超2万元。",
                    thumb: "https://picsum.photos/id/88/100/100",
                    date: "2026-02-16"
                },
                {
                    id: 10,
                    title: "元宇宙场景设计师成就业新蓝海",
                    content: "元宇宙产业的快速发展催生了元宇宙场景设计师这一新兴岗位，该岗位融合了3D建模、交互设计、虚拟现实等多种技能，目前行业人才缺口超50万人。头部企业为吸引人才，开出的年薪普遍在25-50万元之间。",
                    thumb: "https://picsum.photos/id/89/100/100",
                    date: "2026-02-11"
                }
            ]
        };

        // 全局变量
        const categoryNav = document.getElementById('categoryNav');
        const contentTitle = document.getElementById('contentTitle');
        const newsList = document.getElementById('newsList');
        let selectedCategoryId = 1; // 默认选中第一个栏目

        // 移动端菜单切换
        const menuBtn = document.getElementById('menuBtn');
        const mobileMenu = document.getElementById('mobileMenu');
        menuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
            const icon = menuBtn.querySelector('i');
            icon.classList.toggle('fa-bars');
            icon.classList.toggle('fa-times');
        });

        // 1. 渲染栏目导航列表
        function renderCategoryNav() {
            categoryNav.innerHTML = '';
            categoryData.forEach(category => {
                const item = document.createElement('div');
                item.className = `category-item ${selectedCategoryId === category.id ? 'bg-tech-100 text-primary border-secondary' : ''}`;
                item.innerHTML = `
                    <i class="fa-solid ${category.icon} text-secondary mr-3"></i>
                    <span>${category.name}</span>
                `;
                
                // 点击栏目切换右侧内容
                item.addEventListener('click', () => {
                    selectedCategoryId = category.id;
                    renderCategoryNav(); // 重新渲染栏目列表（高亮选中项）
                    renderNewsList();    // 渲染对应新闻列表
                    updateContentTitle(); // 更新右侧标题
                });
                
                categoryNav.appendChild(item);
            });
        }

        // 2. 更新右侧内容标题
        function updateContentTitle() {
            const selectedCategory = categoryData.find(c => c.id === selectedCategoryId);
            contentTitle.innerHTML = `
                <i class="fa-solid ${selectedCategory.icon} text-secondary mr-2"></i>${selectedCategory.name}
            `;
        }

        // 3. 渲染新闻列表
        function renderNewsList() {
            newsList.innerHTML = '';
            const currentNews = newsData[selectedCategoryId] || [];
            
            if (currentNews.length === 0) {
                newsList.innerHTML = '<div class="p-4 text-gray-500 text-center">暂无相关资讯信息</div>';
                return;
            }
            
            currentNews.forEach(news => {
                const item = document.createElement('div');
                item.className = 'news-item';
                // 新闻项内容：缩略图居左，其余内容居右
                item.innerHTML = `
                    <div class="flex items-start">
                        <!-- 新闻缩略图 -->
                        <img src="${news.thumb}" alt="${news.title}" class="w-24 h-24 rounded-lg object-cover mr-4 flex-shrink-0">
                        <!-- 新闻内容 -->
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center justify-between mb-2">
                                <h4 class="text-lg font-semibold text-primary truncate">${news.title}</h4>
                                <span class="text-xs text-gray-500 bg-gray-100 px-2 py-1 rounded">${news.date}</span>
                            </div>
                            <p class="text-sm text-gray-600 line-clamp-3 mb-3">${news.content}</p>
                            <a href="news-detail.html?id=${news.id}&category=${selectedCategoryId}" class="text-secondary hover:text-primary font-medium text-sm flex items-center">
                                查看详情 <i class="fa-solid fa-arrow-right ml-1 text-xs"></i>
                            </a>
                        </div>
                    </div>
                `;

                // 点击标题跳转至新闻详情页
                const titleLink = item.querySelector('a');
                item.addEventListener('click', (e) => {
                    // 避免重复跳转（点击详情链接时不触发卡片点击）
                    if (e.target !== titleLink && !titleLink.contains(e.target)) {
                        window.location.href = `news-detail.html?id=${news.id}&category=${selectedCategoryId}`;
                    }
                });
                
                newsList.appendChild(item);
            });
        }

        // 初始化页面
        renderCategoryNav();
        updateContentTitle();
        renderNewsList();
    </script>
</body>
</html>
