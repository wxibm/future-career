		<script>
			// ----- 移动端菜单切换 -----
			document.getElementById('menuBtn').addEventListener('click', function() {
				const mobileMenu = document.getElementById('mobileMenu');
				mobileMenu.classList.toggle('hidden');
			});

			// ----- Banner轮播功能 -----
			let currentSlide = 0;
			const slides = document.querySelectorAll('.banner-slide');
			const totalSlides = slides.length;
			const bannerWrapper = document.querySelector('.banner-wrapper');
			const indicators = document.querySelectorAll('[data-index]');

			function goToSlide(index) {
				currentSlide = index;
				bannerWrapper.style.transform = `translateX(-${currentSlide * 100}%)`;
				indicators.forEach(indicator => {
					if (parseInt(indicator.dataset.index) === currentSlide) {
						indicator.classList.add('bg-secondary');
						indicator.classList.remove('bg-white/50');
					} else {
						indicator.classList.remove('bg-secondary');
						indicator.classList.add('bg-white/50');
					}
				});
			}

			document.getElementById('nextBtn').addEventListener('click', () => {
				currentSlide = (currentSlide + 1) % totalSlides;
				goToSlide(currentSlide);
			});
			document.getElementById('prevBtn').addEventListener('click', () => {
				currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;
				goToSlide(currentSlide);
			});
			indicators.forEach(indicator => {
				indicator.addEventListener('click', () => {
					goToSlide(parseInt(indicator.dataset.index));
				});
			});
			setInterval(() => {
				currentSlide = (currentSlide + 1) % totalSlides;
				goToSlide(currentSlide);
			}, 5000);

			// ----- 通用数据加载函数 -----
			async function fetchJSON(url) {
				const response = await fetch(url);
				if (!response.ok) throw new Error(`加载失败: ${url}`);
				return response.json();
			}

			// 渲染专业列表（带缩略图，专业代码居右）
			function renderMajors(container, majors) {
				container.innerHTML = '';
				majors.slice(0, 10).forEach(major => {
					const link = document.createElement('a');
					link.href = `majors.html?id=${major.id}`;
					link.target = '_blank';
					link.className = 'list-link';

					const div = document.createElement('div');
					div.className = 'list-item-with-img';

					const img = document.createElement('img');
					img.src = major.major_logo || 'https://picsum.photos/id/20/60/60';
					img.alt = major.name;
					img.className = 'w-14 h-14 rounded-md object-cover mr-3 flex-shrink-0';

					const textDiv = document.createElement('div');
					textDiv.className = 'flex-1 min-w-0';

					const h4 = document.createElement('h4');
					h4.className = 'font-medium truncate list-link-text';
					h4.textContent = major.name;

					const p = document.createElement('p');
					p.className = 'text-sm text-gray-600 truncate';
					p.textContent = major.description || '';

					textDiv.appendChild(h4);
					textDiv.appendChild(p);

					const codeP = document.createElement('p');
					codeP.className = 'text-lg text-gray-500 ml-3 flex-shrink-0';
					codeP.textContent = major.major_code || '';

					div.appendChild(img);
					div.appendChild(textDiv);
					div.appendChild(codeP);
					link.appendChild(div);
					container.appendChild(link);
				});
			}

			// 渲染岗位技能（无缩略图，标题/技能描述/无日期）
			function renderSkills(container, skills) {
				container.innerHTML = '';
				skills.slice(0, 10).forEach(skill => {
					const link = document.createElement('a');
					link.href = `skills.html?id=${skill.id}`;
					link.target = '_blank';
					link.className = 'list-link';

					const div = document.createElement('div');
					div.className = 'list-item-no-img';

					const h4 = document.createElement('h4');
					h4.className = 'font-medium text-left truncate list-link-text';
					h4.textContent = skill.title || skill.name || '技能';

					const p = document.createElement('p');
					p.className = 'text-sm text-gray-600 text-left truncate my-1';

					// 处理带HTML标签的skills内容，提取纯文本
					if (skill.skills) {
						const parser = new DOMParser();
						const doc = parser.parseFromString(skill.skills, 'text/html');
						p.textContent = doc.body.textContent || '';
					} else {
						p.textContent = '';
					}

					div.appendChild(h4);
					div.appendChild(p);
					link.appendChild(div);
					container.appendChild(link);
				});
			}

			// 渲染招聘信息（带缩略图，公司名称居右）
			function renderRecruitments(container, recruitments) {
				container.innerHTML = '';
				recruitments.slice(0, 10).forEach(rec => {
					const link = document.createElement('a');
					link.href = `recruitments-detail.html?id=${rec.id}`;
					link.target = '_blank';
					link.className = 'list-link';

					const div = document.createElement('div');
					div.className = 'list-item-with-img';

					const img = document.createElement('img');
					img.src = rec.company_logo || 'https://picsum.photos/id/60/60/60';
					img.alt = rec.title;
					img.className = 'w-14 h-14 rounded-md object-cover mr-3 flex-shrink-0';

					const textDiv = document.createElement('div');
					textDiv.className = 'flex-1 min-w-0';

					const h4 = document.createElement('h4');
					h4.className = 'font-medium truncate list-link-text';
					h4.textContent = rec.title;

					const p = document.createElement('p');
					p.className = 'text-sm text-gray-600 truncate';
					// 截取部分职位描述作为预览
					p.textContent = rec.job_description ? rec.job_description.substring(0, 30) + '…' : '';

					textDiv.appendChild(h4);
					textDiv.appendChild(p);

					const companyP = document.createElement('p');
					companyP.className = 'text-xs text-gray-500 ml-3 flex-shrink-0';
					companyP.textContent = rec.company_name || '';

					div.appendChild(img);
					div.appendChild(textDiv);
					div.appendChild(companyP);
					link.appendChild(div);
					container.appendChild(link);
				});
			}

			// 渲染就业新闻（带缩略图，日期居右）
			function renderNews(container, news) {
				container.innerHTML = '';
				news.slice(0, 10).forEach(item => {
					const link = document.createElement('a');
					link.href = `news-detail.html?id=${item.id}`;
					link.target = '_blank';
					link.className = 'list-link';

					const div = document.createElement('div');
					div.className = 'list-item-with-img';

					const img = document.createElement('img');
					img.src = item.cover_image || 'https://picsum.photos/id/80/60/60';
					img.alt = item.title;
					img.className = 'w-14 h-14 rounded-md object-cover mr-3 flex-shrink-0';

					const textDiv = document.createElement('div');
					textDiv.className = 'flex-1 min-w-0';

					const h4 = document.createElement('h4');
					h4.className = 'font-medium truncate list-link-text';
					h4.textContent = item.title;

					const p = document.createElement('p');
					p.className = 'text-sm text-gray-600 truncate';
					p.textContent = item.content ? item.content.substring(0, 30) + '…' : '';

					textDiv.appendChild(h4);
					textDiv.appendChild(p);

					const dateP = document.createElement('p');
					dateP.className = 'text-xs text-gray-500 ml-3 flex-shrink-0';
					dateP.textContent = item.publish_date || '';

					div.appendChild(img);
					div.appendChild(textDiv);
					div.appendChild(dateP);
					link.appendChild(div);
					container.appendChild(link);
				});
			}

			// 渲染就业政策（无缩略图，标题/内容/日期）
			function renderPolicies(container, policies) {
				container.innerHTML = '';
				policies.slice(0, 10).forEach(policy => {
					const link = document.createElement('a');
					link.href = `policy-detail.html?id=${policy.id}`;
					link.target = '_blank';
					link.className = 'list-link';

					const div = document.createElement('div');
					div.className = 'list-item-no-img';

					const h4 = document.createElement('h4');
					h4.className = 'font-medium text-left truncate list-link-text';
					h4.textContent = policy.title;

					const p = document.createElement('p');
					p.className = 'text-sm text-gray-600 text-left truncate my-1';
					p.textContent = policy.content ? policy.content.substring(0, 40) + '…' : '';

					const dateP = document.createElement('p');
					dateP.className = 'text-xs text-gray-500 text-right';
					dateP.textContent = policy.publish_date || '';

					div.appendChild(h4);
					div.appendChild(p);
					div.appendChild(dateP);
					link.appendChild(div);
					container.appendChild(link);
				});
			}

			// 渲染面试技巧（无缩略图，标题/内容/日期）
			function renderInterview(container, interviews) {
				container.innerHTML = '';
				interviews.slice(0, 10).forEach(item => {
					const link = document.createElement('a');
					link.href = `interview-detail.html?id=${item.id}`;
					link.target = '_blank';
					link.className = 'list-link';

					const div = document.createElement('div');
					div.className = 'list-item-no-img';

					const h4 = document.createElement('h4');
					h4.className = 'font-medium text-left truncate list-link-text';
					h4.textContent = item.title;

					const p = document.createElement('p');
					p.className = 'text-sm text-gray-600 text-left truncate my-1';
					p.textContent = item.content ? item.content.substring(0, 40) + '…' : '';

					const dateP = document.createElement('p');
					dateP.className = 'text-xs text-gray-500 text-right';
					dateP.textContent = item.publish_date || '';

					div.appendChild(h4);
					div.appendChild(p);
					div.appendChild(dateP);
					link.appendChild(div);
					container.appendChild(link);
				});
			}

			// ----- 页面加载后并发请求六个JSON文件 -----
			document.addEventListener('DOMContentLoaded', async () => {
				try {
					const [majors, skills, recruitments, news, policies, interviews] = await Promise.all([
						fetchJSON('data/majors.json').catch(() => []),
						fetchJSON('data/skills.json').catch(() => []),
						fetchJSON('data/recruitments.json').catch(() => []),
						fetchJSON('data/news.json').catch(() => []),
						fetchJSON('data/policies.json').catch(() => []),
						fetchJSON('data/interview.json').catch(() => [])
					]);
