<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>未来职造：专业·岗位技能·招聘信息指南网</title>
    <!-- 引入Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入Font Awesome图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Tailwind自定义配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1E3A8A', // 主色调深蓝
                        secondary: '#3B82F6', // 辅助色亮蓝
                        tech: {
                            50: '#EFF6FF',
                            100: '#DBEAFE',
                            200: '#BFDBFE',
                            800: '#1E40AF',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            /* 导航项样式 */
            .nav-item {
                @apply px-4 py-2 rounded-md transition-all duration-300 hover:bg-secondary/20 hover:text-white;
            }
            /* 专业导航列表项 */
            .major-item {
                @apply p-3 rounded-lg transition-all duration-300 hover:bg-tech-100 hover:text-primary font-medium border-l-4 border-transparent hover:border-secondary cursor-pointer;
            }
            /* 岗位列表项 */
            .job-item {
                @apply p-3 rounded-lg transition-all duration-300 hover:bg-tech-100 hover:text-primary font-medium border-l-4 border-transparent hover:border-secondary cursor-pointer;
            }
            /* 岗位技能列表项 */
            .skill-item {
                @apply p-4 rounded-xl bg-white shadow-sm border border-tech-200/50 transition-all duration-300 hover:shadow-md hover:bg-tech-50;
            }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 min-h-screen flex flex-col">
    <!-- 头部导航 -->
    <header class="bg-primary text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4">
            <!-- Logo和标题 -->
            <div class="flex items-center justify-between py-4">
                <div class="flex items-center space-x-3">
                    <div class="w-12 h-12 bg-secondary rounded-lg flex items-center justify-center">
                        <i class="fa-solid fa-briefcase text-2xl"></i>
                    </div>
                    <h1 class="text-xl md:text-2xl font-bold">未来职造：专业·岗位技能·招聘信息指南网</h1>
                </div>
                
                <!-- 移动端菜单按钮 -->
                <button id="menuBtn" class="md:hidden text-white text-2xl">
                    <i class="fa-solid fa-bars"></i>
                </button>
                
                <!-- 导航菜单 - 桌面端 -->
                <nav class="hidden md:flex items-center space-x-1">
                    <a href="index.html" class="nav-item">网站首页</a>
                    <a href="majors.html" class="nav-item">专业列表</a>
                    <a href="skills.html" class="nav-item bg-secondary/30 font-medium">岗位技能</a>
                    <a href="recruitments.html" class="nav-item">招聘信息</a>
                    <a href="news.html" class="nav-item">就业新闻</a>
                    <a href="policies.html" class="nav-item">就业政策</a>
                    <a href="interview.html" class="nav-item">面试技巧</a>
                </nav>
            </div>
            
            <!-- 移动端导航菜单 -->
            <nav id="mobileMenu" class="md:hidden hidden pb-4">
                <div class="flex flex-col space-y-2">
                    <a href="index.html" class="nav-item">网站首页</a>
                    <a href="majors.html" class="nav-item">专业列表</a>
                    <a href="skills.html" class="nav-item bg-secondary/30 font-medium">岗位技能</a>
                    <a href="recruitments.html" class="nav-item">招聘信息</a>
                    <a href="news.html" class="nav-item">就业新闻</a>
                    <a href="policies.html" class="nav-item">就业政策</a>
                    <a href="interview.html" class="nav-item">面试技巧</a>
                </div>
            </nav>
        </div>
    </header>

    <!-- 主要内容区 -->
    <main class="flex-1 container mx-auto px-4 py-8">
        <!-- 页面标题 -->
        <div class="mb-8">
            <h2 class="text-[clamp(1.5rem,3vw,2.5rem)] font-bold text-primary flex items-center">
                <i class="fa-solid fa-sitemap text-secondary mr-3"></i>岗位技能
            </h2>
            <p class="text-gray-600 mt-2">精准匹配专业对应的岗位及所需核心技能，助力职业发展</p>
        </div>

        <!-- 加载提示 -->
        <div id="loading" class="flex justify-center items-center py-12">
            <div class="text-primary text-center">
                <i class="fa-solid fa-spinner fa-spin text-3xl mb-2"></i>
                <p>正在加载数据...</p>
            </div>
        </div>

        <!-- 三栏布局 -->
        <div id="contentWrapper" class="grid grid-cols-1 lg:grid-cols-12 gap-6 hidden">
            <!-- 左侧：专业导航（纵向列表） -->
            <div class="lg:col-span-3 bg-white rounded-xl shadow-sm p-4 h-fit sticky top-24">
                <h3 class="text-xl font-semibold text-primary mb-4 flex items-center border-b border-tech-200 pb-3">
                    <i class="fa-solid fa-graduation-cap text-secondary mr-2"></i>专业导航
                </h3>
                <div id="majorNav" class="space-y-1">
                    <!-- 专业列表会通过JS生成 -->
                </div>
            </div>

            <!-- 中间：岗位列表（纵向列表） -->
            <div class="lg:col-span-4 bg-white rounded-xl shadow-sm p-4">
                <h3 class="text-xl font-semibold text-primary mb-4 flex items-center border-b border-tech-200 pb-3">
                    <i class="fa-solid fa-briefcase text-secondary mr-2"></i>岗位列表
                </h3>
                <div id="jobList" class="space-y-1">
                    <!-- 岗位列表会通过JS生成 -->
                </div>
            </div>

            <!-- 右侧：岗位技能（纵向列表） -->
            <div class="lg:col-span-5 bg-white rounded-xl shadow-sm p-4">
                <h3 class="text-xl font-semibold text-primary mb-4 flex items-center border-b border-tech-200 pb-3">
                    <i class="fa-solid fa-gears text-secondary mr-2"></i>岗位技能要求
                </h3>
                <div id="skillList" class="space-y-3">
                    <!-- 岗位技能列表会通过JS生成 -->
                </div>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="bg-primary text-white py-6 mt-auto">
        <div class="container mx-auto px-4 text-center">
            <p>&copy; 2026 未来职造 - 专业·岗位技能·招聘信息指南网 版权所有</p>
            <p class="text-sm text-tech-200 mt-2">本网站仅提供就业信息参考，具体以官方发布为准</p>
        </div>
    </footer>

    <!-- JavaScript交互逻辑 -->
    <script>
        // 全局变量
        const majorNav = document.getElementById('majorNav');
        const jobList = document.getElementById('jobList');
        const skillList = document.getElementById('skillList');
        const loading = document.getElementById('loading');
        const contentWrapper = document.getElementById('contentWrapper');
        let majorData = []; // 专业数据
        let skillData = []; // 岗位技能数据
        let selectedMajorId = 1; // 默认选中第一个专业
        let selectedJobId = 1; // 默认选中第一个岗位

        // 移动端菜单切换
        const menuBtn = document.getElementById('menuBtn');
        const mobileMenu = document.getElementById('mobileMenu');
        menuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
            const icon = menuBtn.querySelector('i');
            icon.classList.toggle('fa-bars');
            icon.classList.toggle('fa-times');
        });

        // 读取JSON数据
        async function loadData() {
            try {
                // 并行加载两个JSON文件
                const [majorsRes, skillsRes] = await Promise.all([
                    fetch('data/majors.json'),
                    fetch('data/skills.json')
                ]);
                
                // 解析JSON数据
                majorData = await majorsRes.json();
                skillData = await skillsRes.json();
                
                // 处理skills.json中字段不一致问题（name/title统一为title）
                skillData = skillData.map(item => {
                    return {
                        id: item.id,
                        title: item.title || item.name, // 兼容name字段
                        skills: item.skills,
                        major_ids: item.major_ids
                    };
                });

                // 初始化选中的ID（确保存在）
                if (majorData.length > 0) {
                    selectedMajorId = majorData[0].id;
                }
                const filteredJobs = getJobsByMajorId(selectedMajorId);
                if (filteredJobs.length > 0) {
                    selectedJobId = filteredJobs[0].id;
                }

                // 隐藏加载提示，显示内容
                loading.classList.add('hidden');
                contentWrapper.classList.remove('hidden');

                // 渲染页面
                renderMajorNav();
                renderJobList();
                renderSkillList();
            } catch (error) {
                console.error('加载数据失败:', error);
                loading.innerHTML = `
                    <div class="text-red-500 text-center">
                        <i class="fa-solid fa-exclamation-triangle text-3xl mb-2"></i>
                        <p>数据加载失败，请检查文件路径</p>
                    </div>
                `;
            }
        }

        // 根据专业ID筛选岗位
        function getJobsByMajorId(majorId) {
            return skillData.filter(job => job.major_ids.includes(majorId));
        }

        // 渲染专业导航列表
        function renderMajorNav() {
            majorNav.innerHTML = '';
            if (majorData.length === 0) {
                majorNav.innerHTML = '<div class="p-3 text-gray-500 text-center">暂无专业信息</div>';
                return;
            }

            majorData.forEach(major => {
                const item = document.createElement('div');
                item.className = `major-item ${selectedMajorId === major.id ? 'bg-tech-100 text-primary border-secondary' : ''}`;
                item.innerHTML = `${major.name}（${major.major_code}）`;
                
                // 点击专业切换岗位列表
                item.addEventListener('click', () => {
                    selectedMajorId = major.id;
                    // 获取当前专业对应的第一个岗位ID
                    const filteredJobs = getJobsByMajorId(selectedMajorId);
                    selectedJobId = filteredJobs.length > 0 ? filteredJobs[0].id : 0;
                    
                    renderMajorNav(); // 重新渲染专业列表（高亮选中项）
                    renderJobList();  // 渲染对应岗位列表
                    renderSkillList(); // 渲染对应技能列表
                });
                
                majorNav.appendChild(item);
            });
        }

        // 渲染岗位列表（根据选中的专业）
        function renderJobList() {
            jobList.innerHTML = '';
            // 筛选当前专业对应的岗位
            const filteredJobs = getJobsByMajorId(selectedMajorId);
            
            if (filteredJobs.length === 0) {
                jobList.innerHTML = '<div class="p-3 text-gray-500 text-center">暂无相关岗位信息</div>';
                return;
            }
            
            filteredJobs.forEach(job => {
                const item = document.createElement('div');
                item.className = `job-item ${selectedJobId === job.id ? 'bg-tech-100 text-primary border-secondary' : ''}`;
                item.innerHTML = job.title;
                
                // 点击岗位显示对应技能
                item.addEventListener('click', () => {
                    selectedJobId = job.id;
                    renderJobList(); // 高亮选中岗位
                    renderSkillList(); // 渲染对应技能
                });
                
                jobList.appendChild(item);
            });
        }

        // 渲染岗位技能列表
        function renderSkillList() {
            skillList.innerHTML = '';
            // 筛选当前岗位对应的技能
            const currentJob = skillData.find(skill => skill.id === selectedJobId);
            
            if (!currentJob) {
                skillList.innerHTML = '<div class="p-4 text-gray-500 text-center">暂无相关技能要求</div>';
                return;
            }
            
            // 渲染技能项
            const item = document.createElement('div');
            item.className = 'skill-item';
            item.innerHTML = `
                <h4 class="font-semibold text-primary mb-2">${currentJob.title}</h4>
                <p class="text-gray-600 text-sm">${currentJob.skills}</p>
            `;
            skillList.appendChild(item);
        }

        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
