						date: "2026-02-17"

						date: "2026-02-18"
					},
					{
						id: 14,
						title: "无领导小组讨论应答技巧：角色定位与发言策略",
						content: "无领导小组讨论考察综合能力，很多求职者不知道如何表现自己。本文讲解无领导小组讨论中的核心角色定位（领导者、时间管理者、记录者等），以及不同阶段的发言策略，帮助求职者在讨论中脱颖而出，同时展现团队合作精神。",
						date: "2026-02-17"
					},
					{
						id: 15,
						title: "面试最后环节：如何提问面试官展现你的价值",
						content: "面试最后的提问环节是展现求职诚意和思考深度的重要机会。本文提供了10个高质量的提问示例，涵盖团队情况、发展路径、业务挑战等方面，同时提醒避免薪资、福利等敏感问题，帮助求职者给面试画上完美句号。",
						date: "2026-02-16"
					}
				]
			};

			// 全局变量
			const categoryNav = document.getElementById('categoryNav');
			const contentTitle = document.getElementById('contentTitle');
			const interviewList = document.getElementById('interviewList');
			let selectedCategoryId = 1; // 默认选中第一个栏目

			// 移动端菜单切换
			const menuBtn = document.getElementById('menuBtn');
			const mobileMenu = document.getElementById('mobileMenu');
			menuBtn.addEventListener('click', () => {
				mobileMenu.classList.toggle('hidden');
				const icon = menuBtn.querySelector('i');
				icon.classList.toggle('fa-bars');
				icon.classList.toggle('fa-times');
			});

			// 1. 渲染栏目导航列表
			function renderCategoryNav() {
				categoryNav.innerHTML = '';
				categoryData.forEach(category => {
					const item = document.createElement('div');
					item.className =
						`category-item ${selectedCategoryId === category.id ? 'bg-tech-100 text-primary border-secondary' : ''}`;
					item.innerHTML = `
                    <i class="fa-solid ${category.icon} text-secondary mr-3"></i>
                    <span>${category.name}</span>
                `;

					// 点击栏目切换右侧内容
					item.addEventListener('click', () => {
						selectedCategoryId = category.id;
						renderCategoryNav(); // 重新渲染栏目列表（高亮选中项）
						renderInterviewList(); // 渲染对应技巧列表
						updateContentTitle(); // 更新右侧标题
					});

					categoryNav.appendChild(item);
				});
			}

			// 2. 更新右侧内容标题
			function updateContentTitle() {
				const selectedCategory = categoryData.find(c => c.id === selectedCategoryId);
				contentTitle.innerHTML = `
                <i class="fa-solid ${selectedCategory.icon} text-secondary mr-2"></i>${selectedCategory.name}
            `;
			}

			// 3. 渲染技巧列表
			function renderInterviewList() {
				interviewList.innerHTML = '';
				const currentPolicies = interviewData[selectedCategoryId] || [];

				if (currentPolicies.length === 0) {
					interviewList.innerHTML = '<div class="p-4 text-gray-500 text-center">暂无相关技巧信息</div>';
					return;
				}

				currentPolicies.forEach(interview => {
					const item = document.createElement('div');
					item.className = 'interview-item';
					// 技巧项内容：标题+日期居上，内容居下
					item.innerHTML = `
                    <div class="mb-3 flex items-center justify-between">
                        <h4 class="text-lg font-semibold text-primary truncate w-[80%]">${interview.title}</h4>
                        <span class="text-xs text-gray-500 bg-gray-100 px-2 py-1 rounded flex-shrink-0">${interview.date}</span>
                    </div>
                    <p class="text-sm text-gray-600 line-clamp-3 mb-3">${interview.content}</p>
                    <a href="interview-detail.html?id=${interview.id}&category=${selectedCategoryId}" class="text-secondary hover:text-primary font-medium text-sm flex items-center">
                        查看详情 <i class="fa-solid fa-arrow-right ml-1 text-xs"></i>
                    </a>
                `;

					// 点击标题跳转至技巧详情页
					const titleElement = item.querySelector('h4');
					const detailLink = item.querySelector('a');

					// 标题点击跳转
					titleElement.addEventListener('click', () => {
						window.location.href =
							`interview-detail.html?id=${interview.id}&category=${selectedCategoryId}`;
					});

					// 卡片点击跳转（排除详情链接区域）
					item.addEventListener('click', (e) => {
						if (e.target !== detailLink && !detailLink.contains(e.target) && e.target !==
							titleElement) {
							window.location.href =
								`interview-detail.html?id=${interview.id}&category=${selectedCategoryId}`;
						}
					});

					interviewList.appendChild(item);
				});
			}

			// 初始化页面
			renderCategoryNav();
			updateContentTitle();
			renderInterviewList();
		</script>
	</body>
</html>
