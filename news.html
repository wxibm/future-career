<!DOCTYPE html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>未来职造：专业·岗位技能·招聘信息指南网</title>
		<!-- 引入Tailwind CSS -->
		<script src="https://cdn.tailwindcss.com"></script>
		<!-- 引入Font Awesome图标 -->
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

		<!-- Tailwind自定义配置 -->
		<script>
			tailwind.config = {
				theme: {
					extend: {
						colors: {
							primary: '#1E3A8A', // 主色调深蓝
							secondary: '#3B82F6', // 辅助色亮蓝
							tech: {
								50: '#EFF6FF',
								100: '#DBEAFE',
								200: '#BFDBFE',
								800: '#1E40AF',
							}
						},
						fontFamily: {
							sans: ['Inter', 'system-ui', 'sans-serif'],
						},
					}
				}
			}
		</script>

		<style type="text/tailwindcss">
			@layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            /* 顶部导航项样式 */
            .nav-item {
                @apply px-4 py-2 rounded-md transition-all duration-300 hover:bg-secondary/20 hover:text-white;
            }
            /* 左侧栏目导航项 */
            .category-item {
                @apply p-4 rounded-xl transition-all duration-300 hover:bg-tech-100 hover:text-primary font-medium border-l-4 border-transparent hover:border-secondary cursor-pointer flex items-center;
            }
            /* 右侧新闻列表项 */
            .news-item {
                @apply p-4 rounded-xl bg-white shadow-sm border border-tech-200/50 transition-all duration-300 hover:shadow-md hover:bg-tech-50 cursor-pointer;
            }
            /* 分页样式 */
            .pagination-item {
                @apply px-3 py-2 rounded-md border border-tech-200 text-gray-700 hover:bg-secondary hover:text-white hover:border-secondary transition-all duration-200;
            }
            .pagination-item.active {
                @apply bg-secondary text-white border-secondary font-medium;
            }
            .pagination-item.disabled {
                @apply opacity-50 cursor-not-allowed hover:bg-transparent hover:text-gray-700 hover:border-tech-200;
            }
        }
    </style>
	</head>
	<body class="bg-gray-50 font-sans text-gray-800 min-h-screen flex flex-col">
		<!-- 头部导航 -->
		<header class="bg-primary text-white shadow-md sticky top-0 z-50">
			<div class="container mx-auto px-4">
				<!-- Logo和标题 -->
				<div class="flex items-center justify-between py-4">
					<div class="flex items-center space-x-3">
						<div class="w-12 h-12 bg-secondary rounded-lg flex items-center justify-center">
							<i class="fa-solid fa-briefcase text-2xl"></i>
						</div>
						<h1 class="text-xl md:text-2xl font-bold">未来职造：专业·岗位技能·招聘信息指南网</h1>
					</div>

					<!-- 移动端菜单按钮 -->
					<button id="menuBtn" class="md:hidden text-white text-2xl">
						<i class="fa-solid fa-bars"></i>
					</button>

					<!-- 导航菜单 - 桌面端 -->
					<nav class="hidden md:flex items-center space-x-1">
						<a href="index.html" class="nav-item">网站首页</a>
						<a href="majors.html" class="nav-item">专业列表</a>
						<a href="skills.html" class="nav-item">岗位技能</a>
						<a href="recruitments.html" class="nav-item">招聘信息</a>
						<a href="news.html" class="nav-item bg-secondary/30 font-medium">就业新闻</a>
						<a href="policies.html" class="nav-item">就业政策</a>
						<a href="interview.html" class="nav-item">面试技巧</a>
					</nav>
				</div>

				<!-- 移动端导航菜单 -->
				<nav id="mobileMenu" class="md:hidden hidden pb-4">
					<div class="flex flex-col space-y-2">
						<a href="index.html" class="nav-item">网站首页</a>
						<a href="majors.html" class="nav-item">专业列表</a>
						<a href="skills.html" class="nav-item">岗位技能</a>
						<a href="recruitments.html" class="nav-item">招聘信息</a>
						<a href="news.html" class="nav-item bg-secondary/30 font-medium">就业新闻</a>
						<a href="policies.html" class="nav-item">就业政策</a>
						<a href="interview.html" class="nav-item">面试技巧</a>
					</div>
				</nav>
			</div>
		</header>

		<!-- 主要内容区 -->
		<main class="flex-1 container mx-auto px-4 py-8">
			<!-- 页面标题 -->
			<div class="mb-8">
				<h2 class="text-[clamp(1.5rem,3vw,2.5rem)] font-bold text-primary flex items-center">
					<i class="fa-solid fa-newspaper text-secondary mr-3"></i>就业新闻
				</h2>
				<p class="text-gray-600 mt-2">掌握最新行业动态、招聘资讯和新兴岗位信息，把握职业发展机遇</p>
			</div>

			<!-- 两栏布局 -->
			<div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
				<!-- 左侧：栏目导航 -->
				<div class="lg:col-span-3 bg-white rounded-xl shadow-sm p-4 h-fit sticky top-24">
					<h3 class="text-xl font-semibold text-primary mb-4 flex items-center border-b border-tech-200 pb-3">
						<i class="fa-solid fa-list-ul text-secondary mr-2"></i>栏目导航
					</h3>
					<div id="categoryNav" class="space-y-2">
						<!-- 栏目列表会通过JS生成 -->
					</div>
				</div>

				<!-- 右侧：信息列表 -->
				<div class="lg:col-span-9 bg-white rounded-xl shadow-sm p-4">
					<h3 id="contentTitle"
						class="text-xl font-semibold text-primary mb-4 flex items-center border-b border-tech-200 pb-3">
						<i class="fa-solid fa-industry text-secondary mr-2"></i>行业动态
					</h3>
					<div id="newsList" class="space-y-4 max-h-[600px] overflow-y-auto pr-2">
						<!-- 加载中提示 -->
						<div class="p-4 text-gray-500 text-center">
							<i class="fa-solid fa-spinner fa-spin mr-2"></i>加载中...
						</div>
					</div>

					<!-- 分页控件 -->
					<div class="mt-8 flex justify-center">
						<nav id="pagination" class="flex items-center space-x-1">
							<!-- 分页按钮会通过JS生成 -->
						</nav>
					</div>
				</div>
			</div>
		</main>

		<!-- 页脚 -->
		<footer class="bg-primary text-white py-6 mt-auto">
			<div class="container mx-auto px-4 text-center">
				<p>&copy; 2026 未来职造 - 专业·岗位技能·招聘信息指南网 版权所有</p>
				<p class="text-sm text-tech-200 mt-2">本网站仅提供就业信息参考，具体以官方发布为准</p>
			</div>
		</footer>

		<!-- JavaScript交互逻辑 -->
		<script>
			// 全局变量
			const categoryNav = document.getElementById('categoryNav');
			const contentTitle = document.getElementById('contentTitle');
			const newsList = document.getElementById('newsList');
			const pagination = document.getElementById('pagination');
			let selectedCategoryId = 1; // 默认选中第一个栏目
			let currentPage = 1; // 当前页码
			const pageSize = 3; // 每页显示新闻数量

			// 栏目配置（与news.json的category字段对应）
			const categoryData = [{
					id: 1,
					name: '行业动态',
					icon: 'fa-industry'
				},
				{
					id: 2,
					name: '招聘资讯',
					icon: 'fa-bullhorn'
				},
				{
					id: 3,
					name: '新兴岗位',
					icon: 'fa-rocket'
				}
			];

			// 存储从JSON加载的新闻数据
			let newsData = {
				1: [], // 行业动态
				2: [], // 招聘资讯
				3: [] // 新兴岗位
			};

			// 移动端菜单切换
			const menuBtn = document.getElementById('menuBtn');
			const mobileMenu = document.getElementById('mobileMenu');
			menuBtn.addEventListener('click', () => {
				mobileMenu.classList.toggle('hidden');
				const icon = menuBtn.querySelector('i');
				icon.classList.toggle('fa-bars');
				icon.classList.toggle('fa-times');
			});

			// 1. 从news.json加载数据
			async function loadNewsData() {
				try {
					const response = await fetch('data/news.json');
					if (!response.ok) {
						throw new Error(`请求失败：${response.status}`);
					}
					const rawData = await response.json();

					// 按分类整理数据，并映射字段（cover_image -> thumb, publish_date -> date）
					rawData.forEach(news => {
						// 匹配分类ID
						let categoryId = 1;
						if (news.category === '招聘资讯') categoryId = 2;
						if (news.category === '新兴岗位') categoryId = 3;

						// 字段映射
						newsData[categoryId].push({
							id: news.id,
							title: news.title,
							content: news.content,
							thumb: news.cover_image, // cover_image映射为thumb
							date: news.publish_date, // publish_date映射为date
							category: news.category
						});
					});

					// 数据加载完成后初始化页面
					initPage();
				} catch (error) {
					console.error('加载新闻数据失败：', error);
					newsList.innerHTML = '<div class="p-4 text-gray-500 text-center">数据加载失败，请刷新重试</div>';
				}
			}

			// 2. 渲染栏目导航列表
			function renderCategoryNav() {
				categoryNav.innerHTML = '';
				categoryData.forEach(category => {
					const item = document.createElement('div');
					item.className =
						`category-item ${selectedCategoryId === category.id ? 'bg-tech-100 text-primary border-secondary' : ''}`;
					item.innerHTML = `
                    <i class="fa-solid ${category.icon} text-secondary mr-3"></i>
                    <span>${category.name}</span>
                `;

					// 点击栏目切换右侧内容
					item.addEventListener('click', () => {
						selectedCategoryId = category.id;
						currentPage = 1; // 切换栏目时重置页码
						renderCategoryNav(); // 重新渲染栏目列表（高亮选中项）
						renderNewsList(); // 渲染对应新闻列表
						updateContentTitle(); // 更新右侧标题
						renderPagination(); // 渲染分页控件
					});

					categoryNav.appendChild(item);
				});
			}

			// 3. 更新右侧内容标题
			function updateContentTitle() {
				const selectedCategory = categoryData.find(c => c.id === selectedCategoryId);
				contentTitle.innerHTML = `
                <i class="fa-solid ${selectedCategory.icon} text-secondary mr-2"></i>${selectedCategory.name}
            `;
			}

			// 4. 获取分页后的新闻数据
			function getPagedNewsData() {
				const allNews = newsData[selectedCategoryId] || [];
				const totalPages = Math.ceil(allNews.length / pageSize);
				const startIndex = (currentPage - 1) * pageSize;
				const endIndex = startIndex + pageSize;
				const pagedData = allNews.slice(startIndex, endIndex);

				return {
					list: pagedData,
					total: allNews.length,
					totalPages: totalPages
				};
			}

			// 5. 渲染新闻列表
			function renderNewsList() {
				const {
					list,
					total
				} = getPagedNewsData();
				newsList.innerHTML = '';

				if (total === 0) {
					newsList.innerHTML = '<div class="p-4 text-gray-500 text-center">暂无相关资讯信息</div>';
					return;
				}

				if (list.length === 0) {
					newsList.innerHTML = '<div class="p-4 text-gray-500 text-center">当前页码无数据</div>';
					return;
				}

				list.forEach(news => {
					const item = document.createElement('div');
					item.className = 'news-item';
					// 新闻项内容：缩略图居左，其余内容居右
					item.innerHTML = `
                    <div class="flex items-start">
                        <!-- 新闻缩略图 -->
                        <img src="${news.thumb}" alt="${news.title}" class="w-24 h-24 rounded-lg object-cover mr-4 flex-shrink-0">
                        <!-- 新闻内容 -->
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center justify-between mb-2">
                                <h4 class="text-lg font-semibold text-primary truncate">${news.title}</h4>
                                <span class="text-xs text-gray-500 bg-gray-100 px-2 py-1 rounded">${news.date}</span>
                            </div>
                            <p class="text-sm text-gray-600 line-clamp-3 mb-3">${news.content}</p>
                            <a href="news-detail.html?id=${news.id}&category=${selectedCategoryId}" class="text-secondary hover:text-primary font-medium text-sm flex items-center">
                                查看详情 <i class="fa-solid fa-arrow-right ml-1 text-xs"></i>
                            </a>
                        </div>
                    </div>
                `;

					// 点击标题跳转至新闻详情页
					const titleLink = item.querySelector('a');
					item.addEventListener('click', (e) => {
						// 避免重复跳转（点击详情链接时不触发卡片点击）
						if (e.target !== titleLink && !titleLink.contains(e.target)) {
							window.location.href =
								`news-detail.html?id=${news.id}&category=${selectedCategoryId}`;
						}
					});

					newsList.appendChild(item);
				});
			}

			// 6. 渲染分页控件
			function renderPagination() {
				const {
					totalPages
				} = getPagedNewsData();
				pagination.innerHTML = '';

				// 总页数为0时不显示分页
				if (totalPages === 0) {
					return;
				}

				// 上一页按钮
				const prevBtn = document.createElement('button');
				prevBtn.className = `pagination-item ${currentPage === 1 ? 'disabled' : ''}`;
				prevBtn.innerHTML = '<i class="fa-solid fa-chevron-left text-xs"></i>';
				prevBtn.disabled = currentPage === 1;
				prevBtn.addEventListener('click', () => {
					if (currentPage > 1) {
						currentPage--;
						renderNewsList();
						renderPagination();
					}
				});
				pagination.appendChild(prevBtn);

				// 页码按钮（显示当前页前后2页 + 首尾页）
				const showPages = [];
				// 始终显示第一页
				if (totalPages > 0) showPages.push(1);

				// 显示当前页前后2页
				for (let i = Math.max(2, currentPage - 2); i <= Math.min(totalPages - 1, currentPage + 2); i++) {
					showPages.push(i);
				}

				// 始终显示最后一页（如果总页数>1）
				if (totalPages > 1) showPages.push(totalPages);

				// 去重并排序
				const uniquePages = [...new Set(showPages)].sort((a, b) => a - b);

				// 生成页码按钮
				uniquePages.forEach((page, index) => {
					// 添加省略号
					if (index > 0 && page - uniquePages[index - 1] > 1) {
						const ellipsis = document.createElement('span');
						ellipsis.className = 'pagination-item disabled px-2 py-2';
						ellipsis.textContent = '...';
						pagination.appendChild(ellipsis);
					}

					// 页码按钮
					const pageBtn = document.createElement('button');
					pageBtn.className = `pagination-item ${currentPage === page ? 'active' : ''}`;
					pageBtn.textContent = page;
					pageBtn.addEventListener('click', () => {
						currentPage = page;
						renderNewsList();
						renderPagination();
					});
					pagination.appendChild(pageBtn);
				});

				// 下一页按钮
				const nextBtn = document.createElement('button');
				nextBtn.className = `pagination-item ${currentPage === totalPages ? 'disabled' : ''}`;
				nextBtn.innerHTML = '<i class="fa-solid fa-chevron-right text-xs"></i>';
				nextBtn.disabled = currentPage === totalPages;
				nextBtn.addEventListener('click', () => {
					if (currentPage < totalPages) {
						currentPage++;
						renderNewsList();
						renderPagination();
					}
				});
				pagination.appendChild(nextBtn);
			}

			// 7. 初始化页面
			function initPage() {
				renderCategoryNav();
				updateContentTitle();
				renderNewsList();
				renderPagination();
			}

			// 页面加载完成后执行数据加载
			window.addEventListener('DOMContentLoaded', loadNewsData);
		</script>
	</body>
</html>
