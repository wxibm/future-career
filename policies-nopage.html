<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>未来职造：专业·岗位技能·招聘信息指南网</title>
    <!-- 引入Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入Font Awesome图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Tailwind自定义配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1E3A8A', // 主色调深蓝
                        secondary: '#3B82F6', // 辅助色亮蓝
                        tech: {
                            50: '#EFF6FF',
                            100: '#DBEAFE',
                            200: '#BFDBFE',
                            800: '#1E40AF',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            /* 顶部导航项样式 */
            .nav-item {
                @apply px-4 py-2 rounded-md transition-all duration-300 hover:bg-secondary/20 hover:text-white;
            }
            /* 左侧栏目导航项 */
            .category-item {
                @apply p-4 rounded-xl transition-all duration-300 hover:bg-tech-100 hover:text-primary font-medium border-l-4 border-transparent hover:border-secondary cursor-pointer flex items-center;
            }
            /* 右侧政策列表项 */
            .policy-item {
                @apply p-5 rounded-xl bg-white shadow-sm border border-tech-200/50 transition-all duration-300 hover:shadow-md hover:bg-tech-50 cursor-pointer;
            }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 min-h-screen flex flex-col">
    <!-- 头部导航 -->
    <header class="bg-primary text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4">
            <!-- Logo和标题 -->
            <div class="flex items-center justify-between py-4">
                <div class="flex items-center space-x-3">
                    <div class="w-12 h-12 bg-secondary rounded-lg flex items-center justify-center">
                        <i class="fa-solid fa-briefcase text-2xl"></i>
                    </div>
                    <h1 class="text-xl md:text-2xl font-bold">未来职造：专业·岗位技能·招聘信息指南网</h1>
                </div>
                
                <!-- 移动端菜单按钮 -->
                <button id="menuBtn" class="md:hidden text-white text-2xl">
                    <i class="fa-solid fa-bars"></i>
                </button>
                
                <!-- 导航菜单 - 桌面端 -->
                <nav class="hidden md:flex items-center space-x-1">
                    <a href="index.html" class="av-item">网站首页</a>
                    <a href="majors.html" class="nav-item">专业列表</a>
                    <a href="skills.html" class="nav-item">岗位技能</a>
                    <a href="recruitments.html" class="nav-item">招聘信息</a>
                    <a href="news.html" class="nav-item">就业新闻</a>
                    <a href="policies.html" class="nav-item bg-secondary/30 font-medium">就业政策</a>
                    <a href="interview.html" class="nav-item">面试技巧</a>
                </nav>
            </div>
            
            <!-- 移动端导航菜单 -->
            <nav id="mobileMenu" class="md:hidden hidden pb-4">
                <div class="flex flex-col space-y-2">
                    <a href="index.html" class="nav-item">网站首页</a>
                    <a href="majors.html" class="nav-item">专业列表</a>
                    <a href="skills.html" class="nav-item">岗位技能</a>
                    <a href="recruitments.html" class="nav-item">招聘信息</a>
                    <a href="news.html" class="nav-item">就业新闻</a>
                    <a href="policies.html" class="nav-item bg-secondary/30 font-medium">就业政策</a>
                    <a href="interview.html" class="nav-item">面试技巧</a>
                </div>
            </nav>
        </div>
    </header>

    <!-- 主要内容区 -->
    <main class="flex-1 container mx-auto px-4 py-8">
        <!-- 页面标题 -->
        <div class="mb-8">
            <h2 class="text-[clamp(1.5rem,3vw,2.5rem)] font-bold text-primary flex items-center">
                <i class="fa-solid fa-file-contract text-secondary mr-3"></i>就业政策
            </h2>
            <p class="text-gray-600 mt-2">了解最新政策服务、创业扶持、帮扶升学相关政策，助力职业发展</p>
        </div>

        <!-- 两栏布局 -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- 左侧：栏目导航 -->
            <div class="lg:col-span-3 bg-white rounded-xl shadow-sm p-4 h-fit sticky top-24">
                <h3 class="text-xl font-semibold text-primary mb-4 flex items-center border-b border-tech-200 pb-3">
                    <i class="fa-solid fa-list-ul text-secondary mr-2"></i>栏目导航
                </h3>
                <div id="categoryNav" class="space-y-2">
                    <!-- 栏目列表会通过JS生成 -->
                </div>
            </div>

            <!-- 右侧：政策信息列表 -->
            <div class="lg:col-span-9 bg-white rounded-xl shadow-sm p-4">
                <h3 id="contentTitle" class="text-xl font-semibold text-primary mb-4 flex items-center border-b border-tech-200 pb-3">
                    <i class="fa-solid fa-handshake-angle text-secondary mr-2"></i>政策服务
                </h3>
                <div id="policyList" class="space-y-4 max-h-[800px] overflow-y-auto pr-2">
                    <!-- 政策列表会通过JS生成 -->
                </div>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="bg-primary text-white py-6 mt-auto">
        <div class="container mx-auto px-4 text-center">
            <p>&copy; 2026 未来职造 - 专业·岗位技能·招聘信息指南网 版权所有</p>
            <p class="text-sm text-tech-200 mt-2">本网站仅提供就业信息参考，具体以官方发布为准</p>
        </div>
    </footer>

    <!-- JavaScript交互逻辑 -->
    <script>
        // 模拟数据
        // 1. 栏目导航数据
        const categoryData = [
            { id: 1, name: "政策服务", icon: "fa-handshake-angle" },
            { id: 2, name: "创业扶持", icon: "fa-seedling" },
            { id: 3, name: "帮扶升学", icon: "fa-graduation-cap" }
        ];

        // 2. 政策信息数据（关联栏目ID）
        const policyData = {
            // 政策服务
            1: [
                {
                    id: 1,
                    title: "2026年高校毕业生就业补贴申领指南",
                    content: "为促进高校毕业生就业，人社部发布2026年就业补贴政策，符合条件的高校毕业生可申领一次性就业补贴。补贴标准：本科毕业生1500元，硕士毕业生2000元，博士毕业生3000元。申领条件：毕业1年内实现就业，签订1年以上劳动合同并缴纳社保满3个月。申领渠道：线上通过“人社服务平台”APP，线下可到当地政务服务中心办理。",
                    date: "2026-02-20"
                },
                {
                    id: 2,
                    title: "灵活就业人员社保补贴新政策出台",
                    content: "2026年灵活就业人员社保补贴政策调整，补贴比例由50%提高至60%，补贴范围扩大至新业态从业者（如网约车司机、外卖骑手、直播从业者等）。补贴期限最长可达3年，申请材料简化，可全程线上办理。具体标准：按实际缴费金额的60%补贴，每月最高补贴不超过800元。",
                    date: "2026-02-18"
                },
                {
                    id: 3,
                    title: "技能提升补贴申领条件放宽",
                    content: "为鼓励劳动者提升职业技能，2026年技能提升补贴申领条件进一步放宽，取消失业保险缴费年限限制，取得职业资格证书或职业技能等级证书的人员均可申请。补贴标准：初级工1000元，中级工1500元，高级工2000元，技师3000元，高级技师5000元。",
                    date: "2026-02-15"
                }
            ],
            // 创业扶持
            2: [
                {
                    id: 4,
                    title: "2026年大学生创业扶持专项资金申报通知",
                    content: "省人社厅联合财政厅设立大学生创业扶持专项资金，2026年申报工作已启动。符合条件的大学生创业项目可获得最高20万元的无偿资助，同时享受场地补贴、税收减免、创业贷款贴息等政策。申报条件：毕业5年内高校毕业生，创业项目运营满6个月，带动就业3人以上。申报截止日期：2026年3月31日。",
                    date: "2026-02-19"
                },
                {
                    id: 5,
                    title: "小微企业创业担保贷款额度提高至500万元",
                    content: "2026年小微企业创业担保贷款政策调整，单笔贷款额度由300万元提高至500万元，贷款利率按LPR减150个基点执行，财政贴息50%。贷款期限延长至3年，可申请展期1年。重点支持科技型、创新型小微企业，优先扶持吸纳高校毕业生、退役军人、残疾人就业的企业。",
                    date: "2026-02-17"
                },
                {
                    id: 6,
                    title: "创业孵化基地补贴政策升级",
                    content: "为支持创业孵化基地建设，2026年创业孵化基地补贴政策升级，对新认定的国家级孵化基地给予一次性50万元补贴，省级孵化基地给予30万元补贴。同时，对孵化基地内的创业项目，按带动就业人数给予每人1000元的就业奖励。",
                    date: "2026-02-14"
                }
            ],
            // 帮扶升学
            3: [
                {
                    id: 7,
                    title: "2026年专升本扩招政策正式公布",
                    content: "教育厅发布2026年专升本扩招政策，全省专升本招生计划扩大至5万人，较2025年增长15%。扩招重点向制造业、信息技术、医疗卫生等紧缺专业倾斜，退役大学生士兵、建档立卡贫困家庭学生可享受单独招生计划，录取比例提高至80%以上。报名时间：2026年3月1日-15日。",
                    date: "2026-02-21"
                },
                {
                    id: 8,
                    title: "职业技能学历双提升计划启动",
                    content: "人社部联合教育部启动职业技能学历双提升计划，在职劳动者可通过“学历+技能”融合培养模式，同时获得成人高等教育学历证书和职业技能等级证书。符合条件的人员可享受学费补贴，补贴标准为学费的50%，最高补贴不超过5000元。该计划覆盖100个紧缺职业工种。",
                    date: "2026-02-16"
                },
                {
                    id: 9,
                    title: "考研专项计划向基层就业倾斜",
                    content: "2026年全国硕士研究生招生专项计划调整，“退役大学生士兵专项计划”“少数民族骨干计划”“基层就业导向专项计划”招生名额共计增加2000个。其中，基层就业导向专项计划面向毕业后到基层就业满2年的本科毕业生，初试成绩可享受10分加分政策。",
                    date: "2026-02-11"
                }
            ]
        };

        // 全局变量
        const categoryNav = document.getElementById('categoryNav');
        const contentTitle = document.getElementById('contentTitle');
        const policyList = document.getElementById('policyList');
        let selectedCategoryId = 1; // 默认选中第一个栏目

        // 移动端菜单切换
        const menuBtn = document.getElementById('menuBtn');
        const mobileMenu = document.getElementById('mobileMenu');
        menuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
            const icon = menuBtn.querySelector('i');
            icon.classList.toggle('fa-bars');
            icon.classList.toggle('fa-times');
        });

        // 1. 渲染栏目导航列表
        function renderCategoryNav() {
            categoryNav.innerHTML = '';
            categoryData.forEach(category => {
                const item = document.createElement('div');
                item.className = `category-item ${selectedCategoryId === category.id ? 'bg-tech-100 text-primary border-secondary' : ''}`;
                item.innerHTML = `
                    <i class="fa-solid ${category.icon} text-secondary mr-3"></i>
                    <span>${category.name}</span>
                `;
                
                // 点击栏目切换右侧内容
                item.addEventListener('click', () => {
                    selectedCategoryId = category.id;
                    renderCategoryNav(); // 重新渲染栏目列表（高亮选中项）
                    renderPolicyList();   // 渲染对应政策列表
                    updateContentTitle(); // 更新右侧标题
                });
                
                categoryNav.appendChild(item);
            });
        }

        // 2. 更新右侧内容标题
        function updateContentTitle() {
            const selectedCategory = categoryData.find(c => c.id === selectedCategoryId);
            contentTitle.innerHTML = `
                <i class="fa-solid ${selectedCategory.icon} text-secondary mr-2"></i>${selectedCategory.name}
            `;
        }

        // 3. 渲染政策列表
        function renderPolicyList() {
            policyList.innerHTML = '';
            const currentPolicies = policyData[selectedCategoryId] || [];
            
            if (currentPolicies.length === 0) {
                policyList.innerHTML = '<div class="p-4 text-gray-500 text-center">暂无相关政策信息</div>';
                return;
            }
            
            currentPolicies.forEach(policy => {
                const item = document.createElement('div');
                item.className = 'policy-item';
                // 政策项内容：标题+日期居上，内容居下
                item.innerHTML = `
                    <div class="mb-3 flex items-center justify-between">
                        <h4 class="text-lg font-semibold text-primary truncate w-[80%]">${policy.title}</h4>
                        <span class="text-xs text-gray-500 bg-gray-100 px-2 py-1 rounded flex-shrink-0">${policy.date}</span>
                    </div>
                    <p class="text-sm text-gray-600 line-clamp-3 mb-3">${policy.content}</p>
                    <a href="policy-detail.html?id=${policy.id}&category=${selectedCategoryId}" class="text-secondary hover:text-primary font-medium text-sm flex items-center">
                        查看详情 <i class="fa-solid fa-arrow-right ml-1 text-xs"></i>
                    </a>
                `;

                // 点击标题跳转至政策详情页
                const titleElement = item.querySelector('h4');
                const detailLink = item.querySelector('a');
                
                // 标题点击跳转
                titleElement.addEventListener('click', () => {
                    window.location.href = `policy-detail.html?id=${policy.id}&category=${selectedCategoryId}`;
                });
                
                // 卡片点击跳转（排除详情链接区域）
                item.addEventListener('click', (e) => {
                    if (e.target !== detailLink && !detailLink.contains(e.target) && e.target !== titleElement) {
                        window.location.href = `policy-detail.html?id=${policy.id}&category=${selectedCategoryId}`;
                    }
                });
                
                policyList.appendChild(item);
            });
        }

        // 初始化页面
        renderCategoryNav();
        updateContentTitle();
        renderPolicyList();
    </script>
</body>
</html>
